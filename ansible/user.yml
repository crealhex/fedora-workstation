---
- name: Configure Fedora Workstation (user)
  hosts: all
  gather_facts: false
  tasks:
    # ── Workspace Layout ──────────────────────────────────────────────
    - name: Create workspace directories
      file:
        path: "~/{{ item }}"
        state: directory
      loop:
        - Scratch
        - Forge

    # ── Java Ecosystem (SDKMAN) ───────────────────────────────────────
    - name: Install SDKMAN
      shell: curl -s "https://get.sdkman.io" | bash
      args:
        creates: ~/.sdkman/bin/sdkman-init.sh

    - name: Check JVM stack installed
      stat:
        path: "{{ item }}"
      register: jvm_check
      loop:
        - ~/.sdkman/candidates/java/17.0.18-tem
        - ~/.sdkman/candidates/java/21.0.10-tem
        - ~/.sdkman/candidates/java/25.0.2-tem
        - ~/.sdkman/candidates/gradle/current
        - ~/.sdkman/candidates/maven/current
        - ~/.sdkman/candidates/quarkus/current

    - name: Install JVM stack via SDKMAN
      shell: |
        source ~/.sdkman/bin/sdkman-init.sh
        sdk install java 17.0.18-tem
        sdk install java 21.0.10-tem
        sdk install java 25.0.2-tem
        sdk default java 25.0.2-tem
        sdk install gradle
        sdk install maven
        sdk install quarkus
      args:
        executable: /bin/bash
      when: jvm_check.results | selectattr('stat.exists', 'false') | list | length > 0

    # ── JavaScript/TypeScript ─────────────────────────────────────────
    - name: Install fnm
      shell: curl -fsSL https://fnm.vercel.app/install | bash
      args:
        creates: ~/.local/share/fnm/fnm

    - name: Install Node.js LTS via fnm
      shell: |
        export PATH="$HOME/.local/share/fnm:$PATH"
        eval "$(fnm env)"
        fnm install --lts
      args:
        executable: /bin/bash
        creates: ~/.local/share/fnm/aliases/lts-latest

    # ── Python ────────────────────────────────────────────────────────
    - name: Install uv
      shell: curl -fsSL https://astral.sh/uv/install.sh | sh
      args:
        creates: ~/.local/bin/uv

    - name: Install Bun
      shell: curl -fsSL https://bun.sh/install | bash
      args:
        creates: ~/.bun/bin/bun

    # ── AI Coding CLIs ────────────────────────────────────────────────
    - name: Install Claude Code
      shell: curl -fsSL https://claude.ai/install.sh | bash
      args:
        creates: ~/.local/bin/claude

    - name: Install GPT Codex
      shell: |
        export BUN_INSTALL="$HOME/.bun"
        export PATH="$BUN_INSTALL/bin:$PATH"
        bun install -g @openai/codex
      args:
        executable: /bin/bash
        creates: ~/.bun/install/global/node_modules/@openai/codex

    # ── Display Config ────────────────────────────────────────────────
    - name: Create GNOME config directory
      file:
        path: ~/.config
        state: directory

    - name: Restore monitors.xml
      copy:
        src: files/monitors.xml
        dest: ~/.config/monitors.xml

    # ── Shell Customization ───────────────────────────────────────────
    - name: Configure shell prompt and aliases
      blockinfile:
        path: ~/.bashrc
        marker: "# {mark} WORKSTATION CONFIG"
        block: |
          export PS1='\[\e[1;32m\]\u@\h\[\e[0m\] \[\e[1;34m\]\W\[\e[0m\] \$ '
          alias fig='docker compose'
          alias vim='nvim'

    - name: Configure GNU Screen defaults
      blockinfile:
        path: ~/.screenrc
        create: true
        marker: "# {mark} WORKSTATION SCREEN CONFIG"
        block: |
          escape ^Vv
          term "screen-256color"
          truecolor on

    - name: Check GNOME suspend already disabled
      shell: gsettings get org.gnome.settings-daemon.plugins.power sleep-inactive-ac-type
      register: gnome_suspend
      changed_when: false
      args:
        executable: /bin/bash

    - name: Disable GNOME automatic suspend
      shell: |
        gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-ac-type 'nothing'
        gsettings set org.gnome.settings-daemon.plugins.power sleep-inactive-battery-type 'nothing'
        gsettings set org.gnome.desktop.session idle-delay 0
      args:
        executable: /bin/bash
      when: gnome_suspend.stdout != "'nothing'"

    # ── Git Hooks (gitleaks) ──────────────────────────────────────────
    - name: Create global git hooks directory
      file:
        path: ~/.config/git/hooks
        state: directory

    - name: Install global gitleaks pre-commit hook
      copy:
        src: files/gitleaks-pre-commit.sh
        dest: ~/.config/git/hooks/pre-commit
        mode: "0755"

    - name: Set global git hooks path
      ini_file:
        path: ~/.gitconfig
        section: core
        option: hooksPath
        value: ~/.config/git/hooks
        create: true

    - name: Configure Git user name
      ini_file:
        path: ~/.gitconfig
        section: user
        option: name
        value: Luis Enco
        create: true

    - name: Configure Git user email
      ini_file:
        path: ~/.gitconfig
        section: user
        option: email
        value: 38085121+crealhex@users.noreply.github.com
        create: true
